name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and run unit/integration tests
        run: ./mvnw --batch-mode clean test

      - name: Run targeted warehouse integration tests
        run: ./mvnw --batch-mode test "-Dtest=WarehouseConcurrencyIT,WarehouseTestcontainersIT"

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
          if-no-files-found: warn
